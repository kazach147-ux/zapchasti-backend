<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Кабінет продавця</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #0f1115;
}
.card {
    border-radius: 14px;
}
.table td, .table th {
    vertical-align: middle;
}
</style>
</head>

<body class="text-light">

<nav class="navbar navbar-dark bg-dark shadow">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h5">Кабінет продавця</span>
    </div>
</nav>

<div class="container py-4">

<div class="row g-3">

<div class="col-lg-6">
<div class="card bg-dark p-3 shadow">
<h5 class="mb-3">ТТН</h5>
<input id="order_id" class="form-control mb-2" placeholder="ID замовлення">
<input id="ttn" class="form-control mb-3" placeholder="ТТН Нова Пошта">
<button onclick="updateTTN()" class="btn btn-primary w-100">Оновити ТТН та відправити</button>
</div>
</div>

<div class="col-lg-6">
<div class="card bg-dark p-3 shadow">
<h5 class="mb-3">Розсилка</h5>
<textarea id="bulk_msg" rows="3" class="form-control mb-3" placeholder="Текст повідомлення"></textarea>
<button onclick="bulkSend()" class="btn btn-warning w-100">Відправити всім</button>
</div>
</div>

<div class="col-lg-6">
<div class="card bg-dark p-3 shadow">
<h5 class="mb-3">Сервер</h5>
<input id="server_url" value="http://127.0.0.1:8000" class="form-control mb-3">
<button onclick="saveURL()" class="btn btn-secondary w-100">Зберегти URL</button>
</div>
</div>

<div class="col-lg-6">
<div class="card bg-dark p-3 shadow">
<h5 class="mb-3">Пароль адміна</h5>
<input id="new_pass" type="password" class="form-control mb-3" placeholder="Новий пароль">
<button onclick="changePass()" class="btn btn-danger w-100">Змінити пароль</button>
</div>
</div>

<div class="col-12">
<div class="card bg-dark p-3 shadow">
<div class="d-flex gap-2">
<button onclick="syncCatalog()" class="btn btn-success">Синхронізувати ціни</button>
<button onclick="clearAllOrders()" class="btn btn-outline-danger">Очистити всі замовлення</button>
</div>
</div>
</div>

<div class="col-12">
<div class="card bg-dark p-3 shadow">
<h5 class="mb-3">Замовлення</h5>
<div class="table-responsive">
<table class="table table-dark table-striped table-hover align-middle">
<thead>
<tr>
<th>ID</th>
<th>ПІБ</th>
<th>Телефон</th>
<th>Сума</th>
<th>Статус</th>
<th>ТТН</th>
</tr>
</thead>
<tbody id="orders"></tbody>
</table>
</div>
</div>
</div>

</div>
</div>

<script src="admin.js"></script>
</body>
</html>
